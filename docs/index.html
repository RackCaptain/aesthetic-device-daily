<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光电医疗美容设备日报</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans SC', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="bg-gradient-to-r from-blue-600 to-purple-600 text-white py-8">
        <div class="container mx-auto px-4">
            <h1 class="text-3xl font-bold">光电医疗美容设备行业日报</h1>
            <p class="mt-2 text-blue-100">每日自动更新</p>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <div class="bg-white rounded-lg shadow p-8 text-center">
            <div class="mb-4">
                <span class="text-6xl">📰</span>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">日报初始化中...</h2>
            <p class="text-gray-600 mb-4">本项目每天 08:00 自动抓取行业资讯并生成报告</p>
            <div class="text-sm text-gray-500">
                <p>首次运行后将显示最新日报内容</p>
                <p class="mt-2">下次自动更新: 明天 08:00</p>
            </div>
        </div>

        <div class="mt-8 grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="bg-white rounded-lg shadow p-4 border-l-4 border-blue-500">
                <h3 class="text-gray-500 text-sm">今日资讯</h3>
                <p class="text-2xl font-bold text-gray-800">-</p>
            </div>
            <div class="bg-white rounded-lg shadow p-4 border-l-4 border-green-500">
                <h3 class="text-gray-500 text-sm">技术动态</h3>
                <p class="text-2xl font-bold text-gray-800">-</p>
            </div>
            <div class="bg-white rounded-lg shadow p-4 border-l-4 border-yellow-500">
                <h3 class="text-gray-500 text-sm">政策法规</h3>
                <p class="text-2xl font-bold text-gray-800">-</p>
            </div>
            <div class="bg-white rounded-lg shadow p-4 border-l-4 border-purple-500">
                <h3 class="text-gray-500 text-sm">产品发布</h3>
                <p class="text-2xl font-bold text-gray-800">-</p>
            </div>
        </div>
    </main>

    <footer class="text-center text-gray-500 text-sm py-8">
        <p>本报告由 OpenClaw 自动生成</p>
        <p class="mt-1">数据来源: NMPA、FDA、行业媒体</p>
    </footer>
</body>
</html>
